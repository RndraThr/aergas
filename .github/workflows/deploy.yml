name: Deploy to Production

# Auto-deploy ketiga site (aergas, spk2, spk3) setiap ada push ke main.
# Semua langkah build/migrate dijalankan DI SERVER lewat script /home/deploy/deploy-all.sh
# Runner hanya SSH ke server dan memicu script tersebut.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # tombol "Run workflow" manual di tab Actions

# Cegah dua deploy jalan bersamaan
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy (aergas + spk2 + spk3)
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Setup SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Default port 22 kalau secret SSH_PORT kosong
          echo "PORT=${SSH_PORT:-22}" >> "$GITHUB_ENV"

      - name: Deploy all sites
        run: |
          set -e
          ssh -i ~/.ssh/deploy_key \
              -p "${PORT}" \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              "${SSH_USER}@${SSH_HOST}" \
              'bash /home/deploy/deploy-all.sh'
